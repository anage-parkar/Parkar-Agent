# ============================================================
# Parkar.in – Production Nginx Configuration
# Deploy: copy to /etc/nginx/sites-available/parkar.in
#         then: ln -s /etc/nginx/sites-available/parkar.in /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name parkar.in www.parkar.in;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name parkar.in www.parkar.in;

    # ── SSL (replace with your cert paths) ──────────────────
    ssl_certificate     /etc/ssl/certs/parkar.in.crt;
    ssl_certificate_key /etc/ssl/private/parkar.in.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Document root ────────────────────────────────────────
    root /var/www/parkar.in;
    index index.html;
    charset utf-8;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()";

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Static asset caching ─────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── www → non-www redirect ───────────────────────────────
    if ($host = www.parkar.in) {
        return 301 https://parkar.in$request_uri;
    }

    # ════════════════════════════════════════════════════════
    # CLEAN URL REWRITE RULES
    # Maps /clean-url → /folder/file.html
    # ════════════════════════════════════════════════════════

    # Home
    location = / {
        try_files /index.html =404;
    }

    # ── Platforms ────────────────────────────────────────────
    location = /platforms/aioniq              { try_files /platforms/aioniq.html =404; }
    location = /platforms/vector              { try_files /platforms/vector.html =404; }
    location = /platforms/vector-platform     { try_files /platforms/vector-platform.html =404; }
    location = /platforms/vector-integrations { try_files /platforms/vector-integrations.html =404; }

    # ── Solutions ────────────────────────────────────────────
    location = /solutions/agentic-ai    { try_files /solutions/agentic-ai.html =404; }
    location = /solutions/applications  { try_files /solutions/applications.html =404; }
    location = /solutions/data          { try_files /solutions/data.html =404; }
    location = /solutions/cloud         { try_files /solutions/cloud.html =404; }

    # Solutions case studies
    location ~ ^/solutions/case-studies/(.+)$ {
        try_files /solutions/case-studies/$1.html =404;
    }

    # ── GCC ──────────────────────────────────────────────────
    location = /gcc/overview               { try_files /gcc/overview.html =404; }
    location = /gcc/managed-service        { try_files /gcc/managed-service.html =404; }
    location = /gcc/pay-as-you-go          { try_files /gcc/pay-as-you-go.html =404; }
    location = /gcc/build-operate-transfer { try_files /gcc/build-operate-transfer.html =404; }
    location = /gcc/thought-leadership     { try_files /gcc/thought-leadership.html =404; }

    # GCC articles
    location = /gcc/blogs/building-for-intelligence {
        try_files /gcc/blogs/building-for-intelligence.html =404;
    }
    location = /gcc/blogs/why-enterprise-ai-struggles {
        try_files /gcc/blogs/why-enterprise-ai-struggles.html =404;
    }
    location = /gcc/case-studies/gen-ai-studio {
        try_files /gcc/case-studies/gen-ai-studio.html =404;
    }
    location = /gcc/case-studies/real-time-ai-ops {
        try_files /gcc/case-studies/real-time-ai-ops.html =404;
    }

    # ── Industries ───────────────────────────────────────────
    location = /industries/financial-services { try_files /industries/financial-services.html =404; }
    location = /industries/healthcare         { try_files /industries/healthcare.html =404; }
    location = /industries/manufacturing      { try_files /industries/manufacturing.html =404; }
    location = /industries/media              { try_files /industries/media.html =404; }

    # ── Resources ────────────────────────────────────────────
    location = /resources/insights      { try_files /resources/insights.html =404; }
    location = /resources/research      { try_files /resources/research.html =404; }
    location = /resources/case-studies  { try_files /resources/case-studies.html =404; }
    location = /resources/events        { try_files /resources/events.html =404; }
    location = /resources/news          { try_files /resources/news.html =404; }

    # Resource articles (blogs, case-studies, events, news, webinars)
    location ~ ^/resources/(blogs|case-studies|events|news|webinars)/(.+)$ {
        try_files /resources/$1/$2.html =404;
    }

    # ── Company ──────────────────────────────────────────────
    location = /company/about        { try_files /company/about.html =404; }
    location = /company/our-journey  { try_files /company/our-journey.html =404; }
    location = /company/awards       { try_files /company/awards.html =404; }
    location = /company/partners     { try_files /company/partners.html =404; }
    location = /company/leadership   { try_files /company/leadership.html =404; }

    # ── Careers ──────────────────────────────────────────────
    location = /careers/life-at-parkar   { try_files /careers/life-at-parkar.html =404; }
    location = /careers/open-positions   { try_files /careers/open-positions.html =404; }
    location = /careers/team-highlights  { try_files /careers/team-highlights.html =404; }

    location ~ ^/careers/team-highlights/(.+)$ {
        try_files /careers/team-highlights/$1.html =404;
    }

    # ── Contact ──────────────────────────────────────────────
    location = /contact { try_files /contact.html =404; }

    # ── Legal ────────────────────────────────────────────────
    location = /legal/privacy { try_files /legal/privacy.html =404; }
    location = /legal/terms   { try_files /legal/terms.html =404; }

    # ── Serve static files directly (css, js, assets, components) ───────────
    location / {
        try_files $uri $uri/ =404;
    }
}
